; Godot 4 project settings override for Orange Pi production.
;
; Place this file in the same directory as the fruit_view_linux_arm64 binary.
; Keys here override values from project.godot without recompiling.
; See: https://docs.godotengine.org/en/stable/tutorials/export/feature_tags.html
;
; Update vehicle_host and rtsp_url to match your network before deploying.

[head_tracker]

mode="opentrack_udp"
opentrack_port=4242

[video]

source="rtsp_gstreamer"
; IP address of the Raspberry Pi running the camera + RTSP server:
rtsp_url="rtsp://192.168.1.100:8554/stream"
sidecar_port=9001
sidecar_python="python3"

[control]

; IP address of the vehicle Pi receiving control packets:
vehicle_host="192.168.1.100"
vehicle_port=9000
keepalive_interval_sec=0.5

[telemetry]

port=9002
